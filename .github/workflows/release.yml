# .github/workflows/release.yml
name: "GuanFu Release workflow"

on:
  workflow_call:
    inputs:
      input_artifact:
        description: "Artifact name for build inputs"
        required: false
        type: string
        default: ""
      output_artifact:
        description: "Artifact name for build outputs"
        required: false
        type: string
        default: ""
      release_slsa_provenance:
        description: "Whether to release RV release manifest"
        required: false
        type: boolean
        default: false
      rpm_detail_provenance:
        description: "Whether to include RPM binary hashes in provenance"
        required: false
        type: boolean
        default: false
      upload_provenance_to_rekor:
        description: "Whether to upload release manifest DSSE to Rekor"
        required: false
        type: boolean
        default: false
      provenance_name:
        description: "Name of the release manifest bundle file"
        required: false
        type: string
        default: "rv-release-manifest.bundle.json"
      release_tag_name:
        description: "Release tag name"
        required: true
        type: string
      prerelease:
        description: "Whether this is a prerelease"
        required: false
        type: boolean
        default: false
    secrets:
      RV_RELEASE_SIGN_KEY:
        description: "PEM private key used to sign the RV release manifest DSSE"
        required: false

jobs:
  # Job 1: 发布
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare directories
        run: mkdir -p /tmp/input /tmp/output

      # 1. 下载构建输入 artifact
      - name: Download input artifact
        if: inputs.input_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.input_artifact }}
          path: /tmp/input

      # 2. 下载构建输出 artifact
      - name: Download output artifact
        if: inputs.output_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.output_artifact }}
          path: /tmp/output

      # 3. 上传所有文件到 Release
      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            /tmp/input/**
            /tmp/output/**

  # Job 2: 材料准备
  prepare:
    runs-on: ubuntu-latest
    if: inputs.release_slsa_provenance == true
    outputs:
      combined_subjects: ${{ steps.combine.outputs.subjects }}

    steps:
      # 1. 下载构建输入 artifact
      - name: Download input artifact
        if: inputs.input_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.input_artifact }}
          path: inputs/

      # 2. 下载构建输出 artifact
      - name: Download output artifact
        if: inputs.output_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.output_artifact }}
          path: outputs/

      # 3. 生成输入/输出文件哈希（用于 RV release manifest measurements）
      # This step generates SHA256 hashes for all input/output files and exports:
      # - IO_SUBJECTS_B64: base64-encoded hash list for release manifest generation (via GITHUB_ENV)
      - name: Generate hashes for input and output files
        id: generate-io-hashes
        if: inputs.release_slsa_provenance == true
        run: |
          set -euo pipefail
          hashes=""
          for dir in inputs outputs; do
            if [ -d "$dir" ]; then
              while IFS= read -r -d '' file; do
                hash=$(sha256sum "$file" | awk '{print $1}')
                name=$(basename "$file")
                hashes="$hashes$hash  $name\n"
              done < <(find "$dir" -type f -print0)
            fi
          done

          echo "Generated subjects:" >&2
          echo "$hashes" >&2

          echo "IO_SUBJECTS_B64=$(echo -e "$hashes" | base64 -w0)" >> "$GITHUB_ENV"

      # 4. 生成 RPM 包的二进制哈希（可选，用于更详细的 provenance）
      # This step extracts RPM packages from outputs/ and generates SHA256 hashes for all binaries inside, exports:
      # - subjects: base64-encoded hash list including internal file hashes and package name hashes
      - name: Generate binary hashes for RPM packages
        id: generate-rpm-binary-hashes
        if: inputs.release_slsa_provenance == true && inputs.rpm_detail_provenance == true
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y rpm2cpio cpio

          temp_dir=$(mktemp -d)
          trap 'rm -rf "$temp_dir"' EXIT
          subjects_txt="$temp_dir/all-subjects.txt"
          : > "$subjects_txt"

          # Find all RPM files in outputs/
          mapfile -t rpms < <(find outputs/ -type f -name '*.rpm' 2>/dev/null || true)

          for rpm in "${rpms[@]}"; do
            if [ ! -f "$rpm" ]; then
              echo "WARN: RPM not found: $rpm" >&2
              continue
            fi

            echo "Processing RPM: $rpm" >&2

            workdir="$(mktemp -d)"
            # Extract RPM
            if ! rpm2cpio "$rpm" | (cd "$workdir" && cpio -idmv >/dev/null 2>&1); then
              echo "ERROR: Failed to extract RPM: $rpm" >&2
              rm -rf "$workdir"
              continue
            fi

            pushd "$workdir" >/dev/null
            # Calculate sha256 for each file inside the RPM (sorted)
            while IFS= read -r -d '' f; do
              rel="${f#./}"
              sha="$(sha256sum "$f" | awk '{print $1}')"
              echo "$sha  /$rel" >> "$subjects_txt"
            done < <(find . -type f -print0 | sort -z)
            popd >/dev/null

            # Generate name index hash for the RPM package name itself
            pkg_name="${rpm##*/}"
            pkg_hash="$(printf "%s" "$pkg_name" | sha256sum | awk '{print $1}')"
            echo "$pkg_hash  package-name:${pkg_name}" >> "$subjects_txt"

            rm -rf "$workdir"
          done

          echo "Generated subjects:" >&2
          cat "$subjects_txt" >&2

          # Final output: base64(all subjects)
          subjects_b64=$(base64 -w0 < "$subjects_txt")
          echo "RPM_SUBJECTS_B64=$subjects_b64" >> "$GITHUB_ENV"

      # 5. 合并所有 subjects
      # This step combines io_subjects and rpm_subjects (if available) into a single base64-encoded output:
      # - subjects: base64-encoded combined hash list for release manifest generation
      - name: Combine subjects
        id: combine
        run: |
          set -euo pipefail

          io_subjects_b64="$IO_SUBJECTS_B64"
          rpm_subjects_b64="$RPM_SUBJECTS_B64"

          if [ -z "$io_subjects_b64" ]; then
            echo "ERROR: io_subjects is empty" >&2
            exit 1
          fi

          io_subjects=$(echo "$io_subjects_b64" | base64 -d)

          if [ -n "$rpm_subjects_b64" ]; then
            rpm_subjects=$(echo "$rpm_subjects_b64" | base64 -d)
            all_subjects=$(printf '%s\n%s\n' "$io_subjects" "$rpm_subjects" | sed '/^$/d')
          else
            all_subjects="$io_subjects"
          fi

          if [ -z "$all_subjects" ]; then
            echo "ERROR: No subjects found to combine" >&2
            exit 1
          fi

          echo "Combined subjects:" >&2
          echo "$all_subjects" >&2

          combined_b64=$(printf '%s' "$all_subjects" | base64 -w0)
          echo "subjects=$combined_b64" >> "$GITHUB_OUTPUT"

      - name: Generate RV release manifest DSSE
        env:
          COMBINED_SUBJECTS_B64: ${{ steps.combine.outputs.subjects }}
          RV_RELEASE_SIGN_KEY: ${{ secrets.RV_RELEASE_SIGN_KEY }}
          REKOR_URL: ${{ vars.REKOR_URL || 'https://rekor.sigstore.dev' }}
          UPLOAD_TO_REKOR: ${{ inputs.upload_provenance_to_rekor }}
          BUNDLE_NAME: ${{ inputs.provenance_name }}
        run: |
          set -euo pipefail
          mkdir -p release-manifest
          subjects_txt="release-manifest/subjects.txt"
          echo "$COMBINED_SUBJECTS_B64" | base64 -d > "$subjects_txt"

          python3 - "$subjects_txt" release-manifest/release_payload.json <<'PY'
import json
import re
import sys
from collections import OrderedDict

subjects_path, output_path = sys.argv[1], sys.argv[2]
measurements = {}
with open(subjects_path, "r", encoding="utf-8") as f:
    for line in f:
        line = line.strip()
        if not line:
            continue
        digest, name = line.split(None, 1)
        safe = re.sub(r"[^a-zA-Z0-9_]+", "_", name.strip()).strip("_").lower()
        if not safe:
            safe = "artifact"
        key = "cvm_container_{}".format(safe)
        suffix = 2
        while key in measurements and measurements[key]["value"] != digest:
            key = "cvm_container_{}_{}".format(safe, suffix)
            suffix += 1
        measurements[key] = {"algorithm": "sha256", "value": digest.lower()}

payload = OrderedDict()
payload["measurements"] = OrderedDict(sorted(measurements.items()))
payload["schemaVersion"] = 1
with open(output_path, "w", encoding="utf-8") as f:
    f.write(json.dumps(payload, sort_keys=True, separators=(",", ":"), ensure_ascii=False))
PY

          if [ -n "$RV_RELEASE_SIGN_KEY" ]; then
            printf '%s\n' "$RV_RELEASE_SIGN_KEY" > release-manifest/release.key
          else
            echo "WARN: RV_RELEASE_SIGN_KEY is not set; generating an ephemeral signing key for this release manifest." >&2
            openssl ecparam -name prime256v1 -genkey -noout -out release-manifest/release.key
          fi
          openssl pkey -in release-manifest/release.key -pubout -out release-manifest/release.pub

          python3 - release-manifest/release_payload.json release-manifest/release.pae <<'PY'
import sys
payload_type = b"application/vnd.trustee.rv.release+json"
with open(sys.argv[1], "rb") as f:
    payload = f.read()
pae = b"DSSEv1 %d " % len(payload_type) + payload_type + b" %d " % len(payload) + payload
with open(sys.argv[2], "wb") as f:
    f.write(pae)
PY
          openssl dgst -sha256 -sign release-manifest/release.key -out release-manifest/release.sig release-manifest/release.pae
          payload_b64=$(base64 -w0 release-manifest/release_payload.json)
          sig_b64=$(base64 -w0 release-manifest/release.sig)
          jq -n \
            --arg payload "$payload_b64" \
            --arg sig "$sig_b64" \
            '{payload: $payload, payloadType: "application/vnd.trustee.rv.release+json", signatures: [{sig: $sig}]}' \
            > release-manifest/release.dsse.json

          if [ "$UPLOAD_TO_REKOR" = "true" ]; then
            envelope=$(jq -c . release-manifest/release.dsse.json)
            verifier=$(base64 -w0 release-manifest/release.pub)
            jq -n \
              --arg envelope "$envelope" \
              --arg verifier "$verifier" \
              '{kind:"dsse",apiVersion:"0.0.1",spec:{proposedContent:{envelope:$envelope,verifiers:[$verifier]}}}' \
              > release-manifest/rekor-v1-request.json
            code=$(curl -sS -o release-manifest/rekor-v1-entry.json -w '%{http_code}' \
              -X POST "${REKOR_URL%/}/api/v1/log/entries" \
              -H 'Content-Type: application/json' \
              --data-binary @release-manifest/rekor-v1-request.json)
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "Failed to upload RV release manifest to Rekor, HTTP ${code}" >&2
              cat release-manifest/rekor-v1-entry.json >&2 || true
              exit 1
            fi
            jq -n \
              --argfile releasePayload release-manifest/release_payload.json \
              --argfile dsse release-manifest/release.dsse.json \
              --argfile rekor release-manifest/rekor-v1-entry.json \
              '{releasePayload:$releasePayload,dsseEnvelope:$dsse,rekorEntryV1:$rekor}' \
              > "release-manifest/${BUNDLE_NAME}"
          else
            jq -n \
              --argfile releasePayload release-manifest/release_payload.json \
              --argfile dsse release-manifest/release.dsse.json \
              '{releasePayload:$releasePayload,dsseEnvelope:$dsse}' \
              > "release-manifest/${BUNDLE_NAME}"
          fi

      - name: Upload RV release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: rv-release-manifest
          if-no-files-found: error
          path: |
            release-manifest/*.json

  # Job 3: 发布 RV release manifest metadata
  provenance:
    name: Publish RV Release Manifest
    runs-on: ubuntu-22.04
    needs: [release, prepare]
    if: inputs.release_slsa_provenance == true
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download RV release manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: rv-release-manifest
          path: release-manifest

      - name: Upload RV release manifest to Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ inputs.release_tag_name }}
          files: |
            release-manifest/*.json
